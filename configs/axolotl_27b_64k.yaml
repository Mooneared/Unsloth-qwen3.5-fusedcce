# Axolotl config: Qwen3.5-27B LoRA SFT, 64K seqlen, 8×H100
# SP=4, DP=2, ZeRO Stage 1 (shard optimizer across DP group)
#
# 27B at bf16 = 54GB weights. Doesn't fit on one H100 (80GB) with activations.
# ZeRO-1 shards optimizer states across DP group (2 GPUs) → 0.4GB optimizer/GPU.
# Weights are replicated but frozen (LoRA), so 54GB/GPU is the floor.
# With SP=4, local seqlen=16K, activation ~6GB → total ~62GB/GPU. Fits.
#
# Launch: accelerate launch -m axolotl.cli.train configs/axolotl_27b_64k.yaml

base_model: Qwen/Qwen3.5-27B
model_type: AutoModelForCausalLM
trust_remote_code: true

# ── LoRA ───────────────────────────────────────────────────────────────────
adapter: lora
lora_r: 32               # smaller rank to save memory vs 9B
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj
lora_target_linear: false

# ── Dataset ────────────────────────────────────────────────────────────────
datasets:
  - path: /path/to/your/traces.jsonl
    type: completion
    field_messages: text

# ── Sequence length ────────────────────────────────────────────────────────
sequence_len: 65536
sample_packing: true
pad_to_sequence_len: false

# ── Training ───────────────────────────────────────────────────────────────
num_epochs: 2
micro_batch_size: 1
gradient_accumulation_steps: 8  # effective batch = 1 * 2 (DP) * 8 = 16
learning_rate: 1e-5            # lower LR for larger model
lr_scheduler: cosine
warmup_ratio: 0.05
weight_decay: 0.01
optimizer: adamw_torch
bf16: true
tf32: true

# ── Gradient checkpointing ────────────────────────────────────────────────
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# ── Sequence parallelism ──────────────────────────────────────────────────
ring_attention: true

# ── DeepSpeed ZeRO-1 (shard optimizer across DP group) ────────────────────
deepspeed: configs/ds_zero1.json

# ── Logging / saving ──────────────────────────────────────────────────────
output_dir: ./outputs/qwen3.5-27b-64k-lora
logging_steps: 1
save_strategy: steps
save_steps: 50
eval_strategy: "no"

# ── Performance ────────────────────────────────────────────────────────────
flash_attention: true
torch_compile: false
